<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuHeng Registration System</title>
  <style>
    :root {
      --bg: #eef4f3;
      --panel: rgba(255, 255, 255, 0.9);
      --text: #153036;
      --muted: #5f7477;
      --accent: #0f8a83;
      --accent-deep: #0a5c57;
      --shadow: 0 24px 60px rgba(21, 48, 54, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI Variable", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(15, 138, 131, 0.18), transparent 26rem),
        linear-gradient(180deg, var(--bg), #f8fbfb);
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 56px 24px;
    }

    .hero {
      margin-bottom: 24px;
    }

    .hero-kicker {
      color: var(--accent-deep);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .hero h1 {
      margin: 12px 0;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.05;
    }

    .hero p {
      max-width: 780px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .card {
      display: block;
      padding: 26px;
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.84);
      color: inherit;
      text-decoration: none;
    }

    .card:hover {
      transform: translateY(-2px);
      transition: transform 160ms ease;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(15, 138, 131, 0.1);
      color: var(--accent-deep);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .card h2 {
      margin: 14px 0 10px;
      font-size: 1.4rem;
    }

    .card p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.65;
    }

    .meta {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.7;
    }

    @media (max-width: 820px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-kicker">SuHeng Registration System</div>
      <h1>一个系统，两个入口</h1>
      <p>患者端用于自助查询医生、提交挂号和查看我的预约；医院端用于患者建档、排班维护、窗口挂号、退号和审计管理。两端共用同一套医生、患者、挂号和号源数据。</p>
    </section>

    <section class="grid">
      <a class="card" href="patient.html">
        <div class="badge">患者端</div>
        <h2>苏衡门诊挂号系统患者端</h2>
        <p>无需注册登录，可直接选择医生并提交挂号信息，也可以按姓名和手机号查询自己的预约记录。</p>
        <div class="meta">适用对象：患者、家属、自助终端</div>
      </a>

      <a class="card" href="registration.html">
        <div class="badge">医院端</div>
        <h2>医院挂号工作台</h2>
        <p>供挂号窗口和运营管理人员使用，负责排班、号源、建档、退号和审计日志等后台业务。</p>
        <div class="meta">适用对象：挂号员、运营主管、门诊管理人员</div>
      </a>
    </section>
  </main>
</body>
</html>
